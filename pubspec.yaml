name: fnetwork_inspector
description: A Flutter network inspector for Dio and http. Inspect, search, and share API requests in-app with a built-in UI overlay.
version: 0.2.0+1
homepage: https://github.com/ronny-sugianto/fnetwork_inspector
repository: https://github.com/ronny-sugianto/fnetwork_inspector

environment:
  sdk: ^3.7.0
  flutter: ">=3.29.2"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.0.0
  http: ^1.0.0
  uuid: ^4.0.0
  share_plus: ">=11.0.0 <13.0.0"
  flutter_local_notifications: ^19.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0